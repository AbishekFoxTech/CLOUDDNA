{% extends 'app_base.html' %}
{% block title %}Delete Document{% endblock %}

{% block breadcrumb_items %}
  <li class="breadcrumb-item"><a href="{% url 'documents:list' %}">Documents</a></li>
  <li class="breadcrumb-item active" aria-current="page">Delete</li>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="cdna-card p-4 text-center">
      <i class="bi bi-exclamation-triangle text-danger" style="font-size: 2.5rem;"></i>
      <h5 class="fw-bold mt-3">Delete "{{ document.title }}"?</h5>
      <p class="text-body-secondary">This action cannot be undone.</p>
      <form method="post" class="d-flex justify-content-center gap-2">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
        <a href="{% url 'documents:list' %}" class="btn btn-outline-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
