{% load static %}
<aside class="cdna-sidebar">
  <nav class="nav flex-column">
    <a class="nav-link {% if request.resolver_match.app_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard:home' %}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'list' %}active{% endif %}" href="{% url 'documents:list' %}">
      <i class="bi bi-file-earmark-text"></i> My Documents
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'upload' %}active{% endif %}" href="{% url 'documents:upload' %}">
      <i class="bi bi-cloud-upload"></i> Upload
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'favorites' %}active{% endif %}" href="{% url 'documents:favorites' %}">
      <i class="bi bi-star"></i> Favorites
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'search' %}active{% endif %}" href="{% url 'documents:search' %}">
      <i class="bi bi-search"></i> Search
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'profile' %}active{% endif %}" href="{% url 'accounts:profile' %}">
      <i class="bi bi-person"></i> Profile
    </a>
    <a class="nav-link {% if request.resolver_match.url_name == 'settings' %}active{% endif %}" href="{% url 'accounts:settings' %}">
      <i class="bi bi-gear"></i> Settings
    </a>
    <form method="post" action="{% url 'accounts:logout' %}" class="m-0">
      {% csrf_token %}
      <button type="submit" class="nav-link w-100 text-start border-0 bg-transparent">
        <i class="bi bi-box-arrow-right"></i> Logout
      </button>
    </form>

    <hr>
    <div class="px-2 text-uppercase small fw-semibold" style="color: var(--cdna-text-muted);">Intelligence</div>
    <a class="nav-link disabled" href="#" tabindex="-1">
      <i class="bi bi-cpu"></i> AI Engine
    </a>
    <a class="nav-link disabled" href="#" tabindex="-1">
      <i class="bi bi-lightbulb"></i> Recommendations
    </a>
    <a class="nav-link disabled" href="#" tabindex="-1">
      <i class="bi bi-diagram-3"></i> Relationships
    </a>

    {% if user.is_staff %}
      <hr>
      <a class="nav-link" href="{% url 'admin:index' %}" target="_blank">
        <i class="bi bi-shield-lock"></i> Admin
      </a>
    {% endif %}
  </nav>
</aside>
