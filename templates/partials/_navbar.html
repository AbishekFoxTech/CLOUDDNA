{% load static %}
<nav class="navbar navbar-expand-lg cdna-navbar sticky-top" style="height:64px;">
  <div class="container-fluid px-3 px-lg-4">
    {% if user.is_authenticated %}
      <button class="btn text-white d-lg-none me-2" type="button" data-sidebar-toggle aria-label="Toggle sidebar">
        <i class="bi bi-list fs-4"></i>
      </button>
    {% endif %}

    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'home' %}">
      <i class="bi bi-hexagon-fill fs-4"></i>
      <span>{{ SITE_NAME }}</span>
    </a>

    <button class="navbar-toggler text-white border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
      <i class="bi bi-three-dots-vertical text-white fs-4"></i>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-3">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
        {% if user.is_authenticated %}
          <li class="nav-item"><a class="nav-link" href="{% url 'dashboard:home' %}">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'documents:list' %}">Documents</a></li>
        {% endif %}
      </ul>

      <div class="d-flex align-items-center gap-2">
        <button class="theme-toggle-btn" type="button" data-theme-toggle aria-label="Toggle dark mode">
          <i class="theme-toggle-icon bi bi-moon-stars-fill"></i>
        </button>

        {% if user.is_authenticated %}
          <div class="dropdown">
            <button class="btn btn-sm d-flex align-items-center gap-2 text-white dropdown-toggle" type="button" data-bs-toggle="dropdown">
              {% if user.profile.avatar %}
                <img src="{{ user.profile.avatar.url }}" class="avatar-circle-sm" alt="{{ user.username }}">
              {% else %}
                <i class="bi bi-person-circle fs-5"></i>
              {% endif %}
              <span class="d-none d-md-inline">{{ user.first_name|default:user.username }}</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="{% url 'accounts:profile' %}"><i class="bi bi-person me-2"></i>Profile</a></li>
              <li><a class="dropdown-item" href="{% url 'accounts:settings' %}"><i class="bi bi-gear me-2"></i>Settings</a></li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <form method="post" action="{% url 'accounts:logout' %}" class="m-0">
                  {% csrf_token %}
                  <button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right me-2"></i>Logout</button>
                </form>
              </li>
            </ul>
          </div>
        {% else %}
          <a href="{% url 'accounts:login' %}" class="btn btn-sm btn-outline-light">Login</a>
          <a href="{% url 'accounts:register' %}" class="btn btn-sm btn-light fw-semibold">Sign Up</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>
