{% extends "admin/change_list.html" %}

{% block content %}
  <div class="module" style="margin-bottom: 15px; padding: 12px 16px;">
    <div style="margin-bottom: 8px;"><strong>Total relationships:</strong> {{ total_relationships }}</div>
    <div style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
      {% for row in relationship_type_breakdown %}
        <div>{{ row.label }}: <strong>{{ row.count }}</strong></div>
      {% endfor %}
    </div>
  </div>
  {{ block.super }}
{% endblock %}
