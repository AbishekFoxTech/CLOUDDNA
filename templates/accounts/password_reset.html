{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="cdna-auth-wrapper">
  <div class="cdna-auth-card">
    <div class="text-center mb-4">
      <i class="bi bi-key text-primary" style="font-size: 2.5rem;"></i>
      <h3 class="fw-bold mt-2 mb-0">Forgot your password?</h3>
      <p class="text-body-secondary">Enter your email and we'll send you a reset link.</p>
    </div>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <label for="{{ form.email.id_for_label }}" class="form-label fw-semibold">Email address</label>
        {{ form.email }}
        {% if form.email.errors %}<div class="text-danger small mt-1">{{ form.email.errors }}</div>{% endif %}
      </div>
      <button type="submit" class="btn btn-cdna-primary w-100 py-2">Send Reset Link</button>
    </form>

    <p class="text-center mt-4 mb-0">
      <a href="{% url 'accounts:login' %}"><i class="bi bi-arrow-left me-1"></i>Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
