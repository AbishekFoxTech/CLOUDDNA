{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="cdna-auth-wrapper">
  <div class="cdna-auth-card text-center">
    <i class="bi bi-check-circle text-success" style="font-size: 2.5rem;"></i>
    <h3 class="fw-bold mt-2 mb-2">Password reset complete</h3>
    <p class="text-body-secondary">Your password has been changed successfully. You can now log in.</p>
    <a href="{% url 'accounts:login' %}" class="btn btn-cdna-primary mt-2">Login</a>
  </div>
</div>
{% endblock %}
