{% extends 'base.html' %}
{% block title %}Reset Link Sent{% endblock %}

{% block content %}
<div class="cdna-auth-wrapper">
  <div class="cdna-auth-card text-center">
    <i class="bi bi-envelope-check text-primary" style="font-size: 2.5rem;"></i>
    <h3 class="fw-bold mt-2 mb-2">Check your email</h3>
    <p class="text-body-secondary">
      If an account exists with that email address, we've sent instructions for resetting your password.
    </p>
    <a href="{% url 'accounts:login' %}" class="btn btn-cdna-primary mt-3">Back to Login</a>
  </div>
</div>
{% endblock %}
